name: CI

on:
  push:
  pull_request:

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libncurses-dev libunistring-dev libdeflate-dev

      - name: Build notcurses from source
        run: |
          cd /tmp
          git clone --depth 1 --branch v3.0.17 https://github.com/dankamongmen/notcurses.git
          cd notcurses && mkdir build && cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr \
            -DUSE_MULTIMEDIA=none -DUSE_PANDOC=off -DUSE_DOCTEST=off -DUSE_QRCODEGEN=off \
            -DUSE_STATIC=off -DBUILD_EXECUTABLES=off
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -j

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    env:
      COLORTERM: truecolor
      TERM: xterm

    steps:
      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            base-devel
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-ncurses
            mingw-w64-ucrt-x86_64-libunistring
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build notcurses from source
        run: |
          cd /tmp
          git clone --depth 1 --branch v3.0.17 https://github.com/dankamongmen/notcurses.git
          cd notcurses && mkdir build && cd build
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/ucrt64 \
            -DUSE_MULTIMEDIA=none -DUSE_PANDOC=off -DUSE_DOCTEST=off -DUSE_QRCODEGEN=off \
            -DUSE_STATIC=off -DBUILD_EXECUTABLES=off
          ninja
          ninja install

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="/ucrt64/libdata/pkgconfig:/ucrt64/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
