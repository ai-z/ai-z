name: Build APT repo (artifact)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Build on Ubuntu 22.04 to keep runtime dependencies compatible with Jammy.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            opencl-headers \
            ocl-icd-opencl-dev \
            libvulkan-dev \
            dpkg-dev \
            apt-utils

      - name: Build notcurses from source (static)
        run: |
          cd /tmp
          git clone --depth 1 --branch v3.0.17 https://github.com/dankamongmen/notcurses.git
          cd notcurses
          mkdir build && cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DUSE_MULTIMEDIA=none \
            -DUSE_PANDOC=off \
            -DUSE_DOCTEST=off \
            -DUSE_QRCODEGEN=off \
            -DUSE_STATIC=on \
            -DBUILD_EXECUTABLES=off
          ninja
          sudo ninja install
          sudo ldconfig
          pkg-config --modversion notcurses
          # Verify static libraries exist
          ls -la /usr/lib/libnotcurses*.a || ls -la /usr/lib/x86_64-linux-gnu/libnotcurses*.a || true

      - name: Configure
        run: |
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=OFF \
            -DAI_Z_ENABLE_CUDA=ON \
            -DAI_Z_ENABLE_OPENCL=ON \
            -DAI_Z_ENABLE_VULKAN=ON \
            -DAI_Z_STATIC_NOTCURSES=ON

      - name: Build
        run: cmake --build build-release

      - name: Package (.deb)
        run: |
          cd build-release
          cpack -G DEB

      - name: Generate APT repository tree
        run: |
          rm -rf public
          mkdir -p public
          deb_path="$(ls -1 build-release/*.deb | head -n 1)"
          ./packaging/apt/make_repo.sh "$deb_path" ./public stable main

      - name: Upload APT repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-repo
          path: public
          if-no-files-found: error
