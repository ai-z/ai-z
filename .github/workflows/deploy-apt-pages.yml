name: Deploy APT repo (GitHub Pages)

on:
  workflow_run:
    workflows: ["Build APT repo (artifact)"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of the successful 'Build APT repo (artifact)' workflow to deploy"
        required: true
        type: string

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq unzip

      - name: Download APT repo artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          echo "Fetching artifacts for run: $RUN_ID"
          json="$(gh api -H 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts")"

          echo "Available artifacts (id\tname\texpired):"
          echo "$json" | jq -r '.artifacts[] | "\(.id)\t\(.name)\t\(.expired)"' || true

          artifact_id="$(echo "$json" | jq -r '.artifacts[] | select(.name=="apt-repo") | .id' | head -n 1)"
          if [[ -z "${artifact_id}" || "${artifact_id}" == "null" ]]; then
            echo "ERROR: Could not find artifact named 'apt-repo' for run $RUN_ID" >&2
            exit 1
          fi

          rm -rf public artifact.zip
          mkdir -p public
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > artifact.zip
          unzip -q artifact.zip -d public

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
