# Build and publish Python wheels for AI-Z metrics library
name: Python Wheels

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'python/**'
      - 'src/**'
      - 'include/**'
      - '.github/workflows/python-wheels.yml'
  pull_request:
    paths:
      - 'python/**'
      - 'src/**'
      - 'include/**'
      - '.github/workflows/python-wheels.yml'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on Linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.16.2

      - name: Build wheels
        env:
          CIBW_BUILD: "cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64"
          CIBW_SKIP: "*-musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cmake3 || yum install -y cmake
            pip install pybind11 scikit-build-core
          CIBW_ENVIRONMENT: |
            CMAKE_BUILD_PARALLEL_LEVEL=4
          CIBW_BUILD_VERBOSITY: "3"
        run: python -m cibuildwheel python/ --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install build

      - name: Build sdist
        working-directory: python
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-22.04
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'release'

    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Configure trusted publishing in PyPI project settings
          # https://docs.pypi.org/trusted-publishers/
          skip-existing: true

  release:
    name: Upload to GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-22.04
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'release'

    permissions:
      contents: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          fail_on_unmatched_files: false
