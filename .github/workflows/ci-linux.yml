name: CI (Linux)

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-package:
    # Build on the oldest supported Ubuntu to keep glibc/libstdc++ deps compatible
    # with Ubuntu 22.04+.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            opencl-headers \
            ocl-icd-opencl-dev \
            libvulkan-dev \
            dpkg-dev

      - name: Build notcurses from source
        run: |
          cd /tmp
          git clone --depth 1 --branch v3.0.17 https://github.com/dankamongmen/notcurses.git
          cd notcurses
          mkdir build && cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DUSE_MULTIMEDIA=none \
            -DUSE_PANDOC=off \
            -DUSE_DOCTEST=off \
            -DUSE_QRCODEGEN=off \
            -DUSE_STATIC=off \
            -DBUILD_EXECUTABLES=off
          ninja
          sudo ninja install
          sudo ldconfig
          pkg-config --modversion notcurses

      - name: Configure
        run: |
          cmake -S . -B build-ci -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON \
            -DAI_Z_TEST_BACKEND=minitest \
            -DAI_Z_ENABLE_CUDA=ON \
            -DAI_Z_ENABLE_OPENCL=ON \
            -DAI_Z_ENABLE_VULKAN=ON

      - name: Build
        run: cmake --build build-ci

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure

      - name: Package (.deb)
        run: |
          cd build-ci
          cpack -G DEB

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-z-deb-${{ github.sha }}
          path: build-ci/*.deb
          if-no-files-found: error
