name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.1.11). Create/push the tag first; this workflow will not create it."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows zip
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up vcpkg (manifest)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "**/vcpkg.json"
          vcpkgDirectory: "${{ github.workspace }}/_vcpkg"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-release -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build-release

      - name: Stage portable folder
        shell: pwsh
        run: |
          $stage = Join-Path $PWD "dist\\ai-z-windows-${{ inputs.tag }}"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage | Out-Null

          $exe = Join-Path $PWD "build-release\\ai-z.exe"
          if (!(Test-Path $exe)) {
            throw "Expected ai-z.exe at $exe"
          }
          Copy-Item -Force $exe (Join-Path $stage "ai-z.exe")

          # Bundle vcpkg runtime DLL(s) required by the executable.
          $candidateDlls = @()
          if ($env:VCPKG_INSTALLED_DIR) {
            $candidateDlls += Join-Path $env:VCPKG_INSTALLED_DIR "x64-windows\\bin\\pdcurses.dll"
            $candidateDlls += Join-Path $env:VCPKG_INSTALLED_DIR "x64-windows\\debug\\bin\\pdcurses.dll"
          }
          if ($env:VCPKG_ROOT) {
            $candidateDlls += Join-Path $env:VCPKG_ROOT "installed\\x64-windows\\bin\\pdcurses.dll"
            $candidateDlls += Join-Path $env:VCPKG_ROOT "installed\\x64-windows\\debug\\bin\\pdcurses.dll"
          }

          $pdcursesSrc = $candidateDlls | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $pdcursesSrc -and $env:VCPKG_ROOT) {
            $pdcursesSrc = Get-ChildItem -Path (Join-Path $env:VCPKG_ROOT "installed") -Recurse -Filter "pdcurses.dll" -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $pdcursesSrc) {
            throw "pdcurses.dll not found under vcpkg install; cannot create a runnable zip."
          }
          Copy-Item -Force $pdcursesSrc (Join-Path $stage "pdcurses.dll")

      - name: Create zip
        shell: pwsh
        run: |
          $zip = Join-Path $PWD "dist\\ai-z-windows-${{ inputs.tag }}.zip"
          if (Test-Path $zip) { Remove-Item -Force $zip }
          Compress-Archive -Path (Join-Path $PWD "dist\\ai-z-windows-${{ inputs.tag }}\\*") -DestinationPath $zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/ai-z-windows-${{ inputs.tag }}.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libncursesw5-dev \
            opencl-headers \
            ocl-icd-opencl-dev \
            libvulkan-dev \
            dpkg-dev

      - name: Configure
        run: |
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build-release

      - name: Package (.deb)
        run: |
          cd build-release
          cpack -G DEB

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp -v build-release/*.deb dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    steps:
      - name: Verify tag exists (safety check)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          # Fail fast if the tag doesn't exist on the remote (avoid accidentally creating it).
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > /dev/null

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files
        run: |
          set -euo pipefail
          find dist -type f -maxdepth 3 -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ai-z ${{ inputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/ai-z-windows-${{ inputs.tag }}.zip
            dist/**/*.deb
