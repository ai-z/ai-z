name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.1.11). Create/push the tag first; this workflow will not create it."
        required: true
        type: string
      build_installer:
        description: "Also build a Windows installer (.exe) using Inno Setup"
        required: false
        default: true
        type: boolean
  release:
    types: [published]

permissions:
  contents: write

env:
  TAG: ${{ inputs.tag || github.event.release.tag_name }}

jobs:
  build-windows:
    name: Build Windows zip
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    env:
      COLORTERM: truecolor
      TERM: xterm

    steps:
      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            base-devel
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-ncurses
            mingw-w64-ucrt-x86_64-libunistring
            mingw-w64-ucrt-x86_64-libdeflate
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-opencl-headers
            mingw-w64-ucrt-x86_64-opencl-icd
            zip

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG }}

      - name: Build notcurses from source
        run: |
          cd /tmp
          git clone --depth 1 --branch v3.0.17 https://github.com/dankamongmen/notcurses.git
          cd notcurses
          
          # Patch notcurses to skip terminal queries that break Windows Console.
          # Windows Console (ConHost) and Windows Terminal don't respond to many VT queries,
          # causing notcurses to either hang or output garbage escape sequences.
          # 
          # The query flow is: send_initial_queries -> DSRCPR -> KKBDENTER -> IDQUERIES -> send_initial_directives
          # Windows (TERMINAL_MSTERMINAL) is pre-identified so we can skip ALL queries.
          # 
          # Fix: Make send_initial_queries skip all queries when ti->qterm == TERMINAL_MSTERMINAL
          # This is safe because Windows is identified via prepare_windows_terminal() before queries.
          
          # Skip all queries for Windows Terminal - find and replace in send_initial_queries function
          # The function has "int fd = ti->ttyfd;" near the start - add our early return after it
          sed -i 's/int fd = ti->ttyfd;/int fd = ti->ttyfd;\n  if(ti->qterm == TERMINAL_MSTERMINAL){ return 0; }/' src/lib/termdesc.c
          
          # Verify the patch was applied
          grep -n "TERMINAL_MSTERMINAL.*return 0" src/lib/termdesc.c || echo "WARNING: MSTERMINAL patch may not have applied"
          
          mkdir build && cd build
          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/ucrt64 \
            -DUSE_MULTIMEDIA=none \
            -DUSE_PANDOC=off \
            -DUSE_DOCTEST=off \
            -DUSE_QRCODEGEN=off \
            -DUSE_STATIC=off \
            -DBUILD_EXECUTABLES=off
          ninja
          ninja install
          export PKG_CONFIG_PATH="/ucrt64/libdata/pkgconfig:/ucrt64/lib/pkgconfig:$PKG_CONFIG_PATH"
          pkg-config --modversion notcurses

      - name: Configure
        run: |
          version="${{ env.TAG }}"
          version="${version#v}"
          export PKG_CONFIG_PATH="/ucrt64/libdata/pkgconfig:/ucrt64/lib/pkgconfig:$PKG_CONFIG_PATH"
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_BINDIR=. \
            -DCMAKE_PREFIX_PATH=/ucrt64 \
            -DAI_Z_VERSION_OVERRIDE="$version" \
            -DAI_Z_ENABLE_VULKAN=OFF \
            -DAI_Z_ENABLE_OPENCL=ON

      - name: Build
        run: cmake --build build-release

      - name: Stage portable folder
        shell: pwsh
        run: |
          $stage = Join-Path $PWD "dist\ai-z-${{ env.TAG }}-windows-x64"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage | Out-Null

          # Copy the built executable
          $exe = "build-release/ai-z.exe"
          if (!(Test-Path $exe)) {
            throw "Expected ai-z.exe at $exe"
          }
          Copy-Item $exe $stage

          # Copy required MSYS2/MinGW DLLs
          $msys2Bin = "D:\a\_temp\msys64\ucrt64\bin"
          $requiredDlls = @(
            "libnotcurses.dll",
            "libnotcurses-core.dll",
            "libncursesw6.dll",
            "libunistring-5.dll",
            "libdeflate.dll",
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "libwinpthread-1.dll",
            "libiconv-2.dll",
            "libintl-8.dll"
          )
          
          foreach ($dll in $requiredDlls) {
            $src = Join-Path $msys2Bin $dll
            if (Test-Path $src) {
              Copy-Item $src $stage
              Write-Host "Copied: $dll"
            } else {
              Write-Host "Warning: $dll not found at $src"
            }
          }

          Copy-Item -Force LICENSE (Join-Path $stage "LICENSE")
          Copy-Item -Force README.md (Join-Path $stage "README.md")

      - name: Create zip
        shell: pwsh
        run: |
          $zipVersioned = Join-Path $PWD "dist\ai-z-${{ env.TAG }}-windows-x64.zip"
          $zipLatest = Join-Path $PWD "dist\ai-z-windows-x64.zip"
          if (Test-Path $zipVersioned) { Remove-Item -Force $zipVersioned }
          if (Test-Path $zipLatest) { Remove-Item -Force $zipLatest }

          Compress-Archive -Path (Join-Path $PWD "dist\ai-z-${{ env.TAG }}-windows-x64\*") -DestinationPath $zipVersioned
          Copy-Item -Force $zipVersioned $zipLatest

      - name: Build installer (Inno Setup)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_installer) || github.event_name == 'release' }}
        shell: pwsh
        run: |
          choco install innosetup -y

          $version = "${{ env.TAG }}" -replace '^v', ''

          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }

          $outDir = Join-Path $PWD "dist"
          $sourceDir = Join-Path $PWD "dist\ai-z-${{ env.TAG }}-windows-x64"
          $iconFile = Join-Path $PWD "packaging\windows\ai-z.ico"
          
          $isccArgs = @(
            "/DAppVersion=$version"
            "/DSourceDir=$sourceDir"
            "/DOutputDir=$outDir"
            "/DOutputBaseFilename=ai-z-${{ env.TAG }}-windows-x64-setup"
          )
          if (Test-Path $iconFile) {
            $isccArgs += "/DIconFile=$iconFile"
          }
          $isccArgs += "packaging\windows\ai-z.iss"
          
          & $iscc @isccArgs

          # Also emit a stable filename for /releases/latest/download/...
          Copy-Item -Force (Join-Path $outDir "ai-z-${{ env.TAG }}-windows-x64-setup.exe") (Join-Path $outDir "ai-z-windows-x64-setup.exe")

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/ai-z-${{ env.TAG }}-windows-x64.zip
            dist/ai-z-windows-x64.zip
          if-no-files-found: error

      - name: Upload artifact (installer)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_installer) || github.event_name == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: |
            dist/ai-z-${{ env.TAG }}-windows-x64-setup.exe
            dist/ai-z-windows-x64-setup.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux .deb
    # Build on Ubuntu 22.04 so the .deb installs on Ubuntu 22.04+.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libncurses-dev \
            libunistring-dev \
            libdeflate-dev \
            opencl-headers \
            ocl-icd-opencl-dev \
            libvulkan-dev \
            dpkg-dev

      - name: Build notcurses from source (static)
        run: |
          cd /tmp
          git clone --depth 1 --branch v3.0.17 https://github.com/dankamongmen/notcurses.git
          cd notcurses
          
          # Patch notcurses to skip queries that can cause problems in SSH sessions.
          # SSH terminals may not respond to VT queries properly, causing hangs or garbage output.
          # We detect SSH via environment variables and skip queries in that case.
          # Also skip queries for TERMINAL_MSTERMINAL (for Windows builds in this repo).
          
          # Add SSH detection to send_initial_queries - skip queries if SSH_CLIENT or SSH_TTY is set
          sed -i 's/int fd = ti->ttyfd;/int fd = ti->ttyfd;\n  if(getenv("SSH_CLIENT") || getenv("SSH_TTY") || getenv("SSH_CONNECTION")){ return 0; }/' src/lib/termdesc.c
          
          # Also skip send_initial_directives for SSH (it sends DIRECTIVES which includes color/keyboard queries)
          sed -i 's/send_initial_directives(queried_terminals_e qterm, int fd){/send_initial_directives(queried_terminals_e qterm, int fd){\n  if(getenv("SSH_CLIENT") || getenv("SSH_TTY") || getenv("SSH_CONNECTION")){ return 0; }/' src/lib/termdesc.c
          
          # Verify patches were applied
          grep -n "SSH_CLIENT" src/lib/termdesc.c && echo "SSH patches applied" || echo "WARNING: SSH patches may not have applied"
          
          mkdir build && cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DUSE_MULTIMEDIA=none \
            -DUSE_PANDOC=off \
            -DUSE_DOCTEST=off \
            -DUSE_QRCODEGEN=off \
            -DUSE_STATIC=on \
            -DBUILD_EXECUTABLES=off
          ninja
          sudo ninja install
          sudo ldconfig
          pkg-config --modversion notcurses
          # Verify static libraries exist
          ls -la /usr/lib/libnotcurses*.a || ls -la /usr/lib/x86_64-linux-gnu/libnotcurses*.a || true

      - name: Configure
        run: |
          version="${TAG#v}"
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DAI_Z_VERSION_OVERRIDE="$version" \
            -DBUILD_TESTING=OFF \
            -DAI_Z_STATIC_NOTCURSES=ON

      - name: Build
        run: cmake --build build-release

      - name: Package (.deb)
        run: |
          cd build-release
          cpack -G DEB

      - name: Collect artifacts
        run: |
          mkdir -p dist
          deb_path="$(ls -1 build-release/*.deb | head -n 1)"
          cp -v "$deb_path" "dist/ai-z-${TAG}-linux-amd64.deb"
          cp -v "$deb_path" "dist/ai-z-linux-amd64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    steps:
      - name: Verify tag exists (safety check)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          # Fail fast if the tag doesn't exist on the remote (avoid accidentally creating it).
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > /dev/null

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files
        run: |
          set -euo pipefail
          find dist -type f -maxdepth 3 -print

      - name: Create GitHub Release (manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ai-z ${{ env.TAG }}
          generate_release_notes: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(
            dist/**/ai-z-${TAG}-windows-x64.zip
            dist/**/ai-z-windows-x64.zip
            dist/**/ai-z-${TAG}-windows-x64-setup.exe
            dist/**/ai-z-windows-x64-setup.exe
            dist/**/ai-z-${TAG}-linux-amd64.deb
            dist/**/ai-z-linux-amd64.deb
          )
          if (( ${#files[@]} == 0 )); then
            echo "ERROR: no release assets found under dist/" >&2
            find dist -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi

          echo "Uploading to release tag: ${TAG}"
          printf ' - %s\n' "${files[@]}"
          gh release upload "${TAG}" "${files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
