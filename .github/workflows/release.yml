name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.1.11). Create/push the tag first; this workflow will not create it."
        required: true
        type: string
      build_installer:
        description: "Also build a Windows installer (.exe) using Inno Setup"
        required: false
        default: true
        type: boolean
  release:
    types: [published]

permissions:
  contents: write

env:
  TAG: ${{ inputs.tag || github.event.release.tag_name }}

jobs:
  build-windows:
    name: Build Windows zip
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG }}

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up vcpkg (manifest)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "**/vcpkg.json"
          vcpkgDirectory: "${{ github.workspace }}/_vcpkg"

      - name: Configure
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v', ''
          cmake -S . -B build-release -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_BINDIR=. `
            -DCMAKE_PROJECT_VERSION="$version" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        shell: pwsh
        run: cmake --build build-release

      - name: Stage portable folder
        shell: pwsh
        run: |
          $stage = Join-Path $PWD "dist\\ai-z-${{ env.TAG }}-windows-x64"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage | Out-Null

          cmake --install build-release --prefix $stage

          # CMake installs executables to bin/ by default; flatten for a simpler portable layout.
          $binDir = Join-Path $stage "bin"
          if (Test-Path (Join-Path $binDir "ai-z.exe")) {
            Get-ChildItem -Path $binDir -Force | ForEach-Object {
              Move-Item -Force $_.FullName $stage
            }
            Remove-Item -Recurse -Force $binDir
          }

          $exe = Join-Path $stage "ai-z.exe"
          if (!(Test-Path $exe)) {
            throw "Expected ai-z.exe at $exe"
          }

          function Get-DependentDlls([string]$binaryPath) {
            $out = & dumpbin /DEPENDENTS $binaryPath 2>$null
            return $out |
              Where-Object { $_ -match '^\s{4}[^\s]+\.dll\s*$' } |
              ForEach-Object { $_.Trim() }
          }

          # Copy non-system DLL dependencies from vcpkg next to the exe.
          # (MSVC runtime DLLs are installed via InstallRequiredSystemLibraries in CMake.)
          $systemDlls = @(
            'KERNEL32.dll','USER32.dll','GDI32.dll','ADVAPI32.dll','SHELL32.dll','OLE32.dll','OLEAUT32.dll',
            'WS2_32.dll','IPHLPAPI.dll','PSAPI.dll','NTDLL.dll','CRYPT32.dll','COMDLG32.dll','COMCTL32.dll',
            'SHLWAPI.dll','VERSION.dll','IMM32.dll','UXTHEME.dll','DWMAPI.dll','SETUPAPI.dll','WINMM.dll'
          )

          $searchDirs = @()
          # Manifest mode: vcpkg installs to build-dir/vcpkg_installed/{triplet}/bin
          $manifestBinDir = Join-Path $PWD "build-release\\vcpkg_installed\\x64-windows\\bin"
          if (Test-Path $manifestBinDir) {
            $searchDirs += $manifestBinDir
          }
          if ($env:VCPKG_INSTALLED_DIR) {
            $searchDirs += Join-Path $env:VCPKG_INSTALLED_DIR "x64-windows\\bin"
          }
          if ($env:VCPKG_ROOT) {
            $searchDirs += Join-Path $env:VCPKG_ROOT "installed\\x64-windows\\bin"
          }
          $searchDirs = $searchDirs | Where-Object { Test-Path $_ } | Select-Object -Unique

          $queue = New-Object System.Collections.Generic.Queue[string]
          $seen = New-Object 'System.Collections.Generic.HashSet[string]' ([System.StringComparer]::OrdinalIgnoreCase)
          $queue.Enqueue($exe)
          $seen.Add($exe) | Out-Null

          while ($queue.Count -gt 0) {
            $bin = $queue.Dequeue()
            foreach ($dll in (Get-DependentDlls $bin)) {
              if ($systemDlls -contains $dll) { continue }

              $dest = Join-Path $stage $dll
              if (Test-Path $dest) {
                if ($seen.Add($dest)) { $queue.Enqueue($dest) }
                continue
              }

              $src = $searchDirs |
                ForEach-Object { Join-Path $_ $dll } |
                Where-Object { Test-Path $_ } |
                Select-Object -First 1

              if ($src) {
                Write-Host "Copying DLL: $dll from $src"
                Copy-Item -Force $src $dest
                if ($seen.Add($dest)) { $queue.Enqueue($dest) }
              } else {
                Write-Host "Warning: DLL not found in search paths: $dll"
              }
            }
          }

          # Verify critical DLLs are present
          $pdcursesDll = Join-Path $stage "pdcurses.dll"
          if (!(Test-Path $pdcursesDll)) {
            Write-Host "ERROR: pdcurses.dll was not copied to staging directory!"
            Write-Host "Search directories were: $($searchDirs -join ', ')"
            Write-Host "Attempting manual search..."
            $manualFind = Get-ChildItem -Path (Join-Path $PWD "build-release") -Recurse -Filter "pdcurses.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($manualFind) {
              Write-Host "Found pdcurses.dll at: $($manualFind.FullName)"
              Copy-Item -Force $manualFind.FullName $pdcursesDll
            } else {
              throw "pdcurses.dll not found anywhere in build directory"
            }
          }

          Copy-Item -Force LICENSE (Join-Path $stage "LICENSE")
          Copy-Item -Force README.md (Join-Path $stage "README.md")

      - name: Create zip
        shell: pwsh
        run: |
          $zipVersioned = Join-Path $PWD "dist\\ai-z-${{ env.TAG }}-windows-x64.zip"
          $zipLatest = Join-Path $PWD "dist\\ai-z-windows-x64.zip"
          if (Test-Path $zipVersioned) { Remove-Item -Force $zipVersioned }
          if (Test-Path $zipLatest) { Remove-Item -Force $zipLatest }

          Compress-Archive -Path (Join-Path $PWD "dist\\ai-z-${{ env.TAG }}-windows-x64\\*") -DestinationPath $zipVersioned
          Copy-Item -Force $zipVersioned $zipLatest

      - name: Build installer (Inno Setup)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_installer) || github.event_name == 'release' }}
        shell: pwsh
        run: |
          choco install innosetup -y

          $iscc = "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }

          $outDir = Join-Path $PWD "dist"
          $sourceDir = Join-Path $PWD "dist\\ai-z-${{ env.TAG }}-windows-x64"
          & $iscc `
            "/DAppVersion=${{ env.TAG }}" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outDir" `
            "/DOutputBaseFilename=ai-z-${{ env.TAG }}-windows-x64-setup" `
            "packaging\\windows\\ai-z.iss"

          # Also emit a stable filename for /releases/latest/download/...
          Copy-Item -Force (Join-Path $outDir "ai-z-${{ env.TAG }}-windows-x64-setup.exe") (Join-Path $outDir "ai-z-windows-x64-setup.exe")

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/ai-z-${{ env.TAG }}-windows-x64.zip
            dist/ai-z-windows-x64.zip
          if-no-files-found: error

      - name: Upload artifact (installer)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_installer) || github.event_name == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: |
            dist/ai-z-${{ env.TAG }}-windows-x64-setup.exe
            dist/ai-z-windows-x64-setup.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.TAG }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libncursesw5-dev \
            opencl-headers \
            ocl-icd-opencl-dev \
            libvulkan-dev \
            dpkg-dev

      - name: Configure
        run: |
          version="${TAG#v}"
          cmake -S . -B build-release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_PROJECT_VERSION="$version" \
            -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build-release

      - name: Package (.deb)
        run: |
          cd build-release
          cpack -G DEB

      - name: Collect artifacts
        run: |
          mkdir -p dist
          deb_path="$(ls -1 build-release/*.deb | head -n 1)"
          cp -v "$deb_path" "dist/ai-z-${TAG}-linux-amd64.deb"
          cp -v "$deb_path" "dist/ai-z-linux-amd64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    steps:
      - name: Verify tag exists (safety check)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ env.TAG }}
        run: |
          set -euo pipefail
          # Fail fast if the tag doesn't exist on the remote (avoid accidentally creating it).
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" > /dev/null

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files
        run: |
          set -euo pipefail
          find dist -type f -maxdepth 3 -print

      - name: Create GitHub Release (manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ai-z ${{ env.TAG }}
          generate_release_notes: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(
            dist/**/ai-z-${TAG}-windows-x64.zip
            dist/**/ai-z-windows-x64.zip
            dist/**/ai-z-${TAG}-windows-x64-setup.exe
            dist/**/ai-z-windows-x64-setup.exe
            dist/**/ai-z-${TAG}-linux-amd64.deb
            dist/**/ai-z-linux-amd64.deb
          )
          if (( ${#files[@]} == 0 )); then
            echo "ERROR: no release assets found under dist/" >&2
            find dist -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi

          echo "Uploading to release tag: ${TAG}"
          printf ' - %s\n' "${files[@]}"
          gh release upload "${TAG}" "${files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
